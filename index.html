        function searchHero() {
            const input = document.getElementById('searchInput').value.trim();
            const resultDiv = document.getElementById('result');
            const noResult = document.getElementById('noResult');
            
            if (input === "") {
                resultDiv.classList.add('hidden');
                noResult.classList.remove('hidden');
                return;
            }

            let foundData = null;
            let foundName = "";

            // 遍历所有英雄，匹配正名或外号
            for (const [name, data] of Object.entries(heroData)) {
                if (name === input || (data.aliases && data.aliases.includes(input))) {
                    foundData = data;
                    foundName = name;
                    break;
                }
            }
            
            if (foundData) {
                resultDiv.classList.remove('hidden');
                noResult.classList.add('hidden');
                
                // 动态显示英雄名称和外号
                const aliasesText = foundData.aliases.length > 0 ? ` (${foundData.aliases.join(' / ')})` : '';
                document.getElementById('heroNameTitle').innerText = `${foundName}${aliasesText}`;
                
                document.getElementById('counteredBy').innerText = foundData.counteredBy;
                document.getElementById('counters').innerText = foundData.counters;
                document.getElementById('buildAdvice').innerText = foundData.build;
                document.getElementById('antiBuild').innerText = foundData.antiBuild;
            } else {
                resultDiv.classList.add('hidden');
                noResult.classList.remove('hidden');
            }
        }
    </script>
