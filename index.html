<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上单克制查询 - Gabriel Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-6">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-center text-blue-400">英雄联盟手游上单克制查询</h1>
        
        <!-- 搜索框 -->
        <div class="relative mb-8">
            <input type="text" id="searchInput" onkeyup="searchHero()" 
                placeholder="输入英雄名字（如：厄加特）..." 
                class="w-full p-4 rounded-lg bg-gray-800 border border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <!-- 结果展示 -->
        <div id="result" class="hidden space-y-6">
            <div class="bg-gray-800 p-6 rounded-xl shadow-lg border-l-4 border-red-500">
                <h2 class="text-xl font-semibold mb-3 text-red-400">🚨 谁克制他/她？</h2>
                <p id="counteredBy" class="text-gray-300"></p>
            </div>

            <div class="bg-gray-800 p-6 rounded-xl shadow-lg border-l-4 border-green-500">
                <h2 class="text-xl font-semibold mb-3 text-green-400">⚔️ 他/她克制谁？</h2>
                <p id="counters" class="text-gray-300"></p>
            </div>

            <div class="bg-gray-800 p-6 rounded-xl shadow-lg border-l-4 border-blue-500">
                <h2 class="text-xl font-semibold mb-3 text-blue-400">🛡️ 推荐出装思路</h2>
                <p id="buildAdvice" class="text-gray-300 whitespace-pre-line"></p>
            </div>
        </div>
        
        <div id="noResult" class="text-center text-gray-500 mt-10">请输入完整的英雄名字进行查询</div>
    </div>

    <script>
        // 核心数据库：你可以随时在这个 JSON 里添加数据
        const heroData = {
            // --- 🪓 重装战士 (Juggernauts) ---
            "德莱厄斯": {
                counteredBy: "提莫 (致盲)、薇恩 (风筝/真伤)、杰斯 (长手消耗/击退)",
                counters: "赛恩、蒙多、内瑟斯 (笨重且缺乏爆发的英雄)",
                build: "核心：三相之力/黑色切割者、斯特拉克的挑战护手。\n防装：亡者的板甲(加移速)、自然之力。"
            },
            "盖伦": {
                counteredBy: "卡蜜尔 (护盾换血/真伤)、薇恩 (真伤)、德莱厄斯 (持续流血)",
                counters: "贾克斯、雷克顿、锐雯 (怕沉默的技能型刺客/斗士)",
                build: "核心：黑色切割者、斯特拉克的挑战护手。\n针对：打AP出自然之力，打AD出兰顿之兆。"
            },
            "瑟提": {
                counteredBy: "雷克顿 (红怒破盾)、沃利贝尔 (持续回复对拼)、杰斯 (消耗拉扯)",
                counters: "艾瑞莉娅、亚索、盲僧 (突脸近战)",
                build: "核心：破败王者之刃、黑色切割者。\n核心防装：斯特拉克的挑战护手(配合W伤害拉满)。"
            },
            "莫德凯撒": {
                counteredBy: "奥拉夫 (大招免控)、菲奥娜 (灵活拉扯)、薇恩 (真伤)",

                build: "核心：峡谷制造者、瑞莱的冰晶节杖(冰杖留人)。\n针对：败魔(防爆发)、中娅沙漏(躲关键技能)。"
            },

            },

                build: "核心：神圣分离者、纳什之牙(AP玩法) 或 破败(AD玩法)。\n防装：振奋盔甲(强化W回血)。"
            },
            "厄加特": {
                counteredBy: "奥拉夫 (大招免控)、慎 (W挡被动和W)、薇恩 (手长真伤)",
                counters: "德莱厄斯、赛恩、盖伦 (笨重的重装战士)",
                build: "核心：荆棘背心(小反甲)必出，黑色切割者。\n后期补：斯特拉克的挑战护手、败魔/兰顿。"
            },
            "内瑟斯": {
                counteredBy: "德莱厄斯 (前期压制)、奥拉夫 (前期越塔)、提莫 (致盲影响叠Q)",
                counters: "凯南、贾克斯 (中后期W减攻速天克)、大部分缺爆发的坦克",
                build: "核心：三相之力/神圣分离者、冰霜之心。\n防装：振奋盔甲(强化被动吸血)、自然之力。"
            },

            // --- 🗡️ 冲阵战士与轻装斗士 (Divers & Skirmishers) ---
            "菲奥娜": {
                counteredBy: "墨菲特 (高护甲/减攻速)、潘森 (前期压制)、雷克顿 (前期爆发)",
                counters: "亚托克斯、莫德凯撒、瑟提 (技能前摇大，易被W格挡)",
                build: "核心：神圣分离者、破败王者之刃。\n后期：贪欲九头蛇(清线)、死亡之舞。"
            },
            "卡蜜尔": {
                counteredBy: "贾克斯 (E挡Q)、雷克顿 (破盾/高爆发)、提莫 (致盲)",
                counters: "盖伦、内瑟斯、德莱厄斯 (利用机动性白嫖换血)",
                build: "核心：三相之力、死亡之舞。\n防装：斯特拉克的挑战护手、守护天使(复活甲)。"
            },
            "贾克斯": {
                counteredBy: "墨菲特 (减攻速/高甲)、盖伦 (沉默不讲理)、古拉加斯 (消耗+大招炸开)",
                counters: "卡蜜尔、艾瑞莉娅、永恩 (极度依赖普攻的英雄)",
                build: "核心：三相之力、破败王者之刃。\n防装：死亡之舞、守护天使、智慧末刃。"
            },
            "雷克顿": {
                counteredBy: "俄洛伊 (阵地战打不过)、盖伦 (身板硬)、奥拉夫 (硬拼不过)",
                counters: "亚索、锐雯、卡蜜尔 (脆皮/依赖护盾的英雄)",
                build: "核心：破败王者之刃、黑色切割者。\n防装：死亡之舞、斯特拉克的挑战护手。"
            },
            "艾瑞莉娅": {
                counteredBy: "瑟提 (数值碾压)、贾克斯 (E挡平A)、沃利贝尔 (站桩打不过)",
                counters: "杰斯、提莫、纳尔 (长手脆皮，Q兵近身必杀)",
                build: "核心：破败王者之刃、三相之力。\n防装：死亡之舞、智慧末刃(对方AP多时)。"
            },
            "锐雯": {
                counteredBy: "雷克顿 (身板硬/控住秒)、波比 (W挡突进)、盖伦 (沉默)",
                counters: "脆皮长手、格温、永恩 (依赖连招秒杀脆皮)",
                build: "核心：黑色切割者、死亡之舞。\n防装：神圣分离者、斯特拉克的挑战护手、复活甲。"
            },
            "潘森": {
                counteredBy: "赛恩、奥恩、墨菲特 (打不动纯肉坦克)",
                counters: "菲奥娜、提莫、锐雯 (前期身板脆的英雄)",
                build: "核心：幽梦之魂、黑色切割者。\n防装：死亡之舞、玛莫提乌斯之噬、复活甲。"
            },
            "奥拉夫": {
                counteredBy: "贾克斯 (E挡平A)、卡蜜尔 (墙体位移拉扯)、菲奥娜 (真伤对拼)",
                counters: "莫德凯撒、厄加特、潘森 (极度依赖控制的英雄)",
                build: "核心：三相之力/神圣分离者、斯特拉克的挑战护手。\n防装：死亡之舞、正义荣耀(附魔加速鞋)。"
            },
            "亚索": {
                counteredBy: "雷克顿、瑟提、德莱厄斯 (数值碾压，身板太脆)",
                counters: "纳尔、提莫 (风墙挡远程弹道)",
                build: "核心：破败王者之刃、烈阳魔刃、无尽之刃。\n防装：死亡之舞、复活甲。"
            },
            "永恩": {
                counteredBy: "雷克顿、贾克斯、潘森 (前期压制力强的战士)",
                counters: "赛恩、蒙多 (打笨重坦克比较舒服)",
                build: "核心：破败王者之刃、烈阳魔刃、无尽之刃。\n防装：死亡之舞、智慧末刃。"
            },
            "悟空": {
                counteredBy: "盖伦、德莱厄斯、墨菲特 (身板比猴子硬)",
                counters: "杰斯、提莫、凯南 (突进+假身克制脆皮长手)",
                build: "核心：神圣分离者、黑色切割者。\n防装：死亡之舞、斯特拉克的挑战护手。"
            },

            // --- 🛡️ 坦克前排 (Tanks) ---
            "墨菲特": {
                counteredBy: "塞拉斯 (偷大招)、莫德凯撒、格温 (AP真伤/魔法伤害)",
                counters: "贾克斯、菲奥娜、泰达米尔 (极度依赖攻速的AD英雄)",
                build: "核心：日炎圣盾、冰霜之心/兰顿之兆(针对AD)。\n防AP：败魔、自然之力。"
            },
            "赛恩": {
                counteredBy: "亚托克斯 (吸血+打断)、德莱厄斯、格温 (百分比伤害)",
                counters: "提莫、阿卡丽、潘森 (缺乏打前排能力的英雄)",
                build: "核心：日炎圣盾、心之钢。\n防装：荆棘之甲(反甲)、巨型九头蛇(补伤害)。"
            },
            "奥恩": {
                counteredBy: "菲奥娜 (真伤/W挡R)、格温 (真伤)、莫德凯撒 (偷属性)",
                counters: "潘森、锐雯、雷克顿 (靠技能消耗的物理刺客/战士)",
                build: "核心：日炎圣盾、冰锤/冰脉护手。\n防装：深渊面具、荆棘之甲。"
            },
            "蒙多医生": {
                counteredBy: "亚托克斯 (高额吸血)、德莱厄斯 (前期流血)、薇恩 (真伤)",
                counters: "提莫、格温、阿卡丽 (被动免控，不怕AP消耗)",
                build: "核心：心之钢、日炎圣盾。\n防装：振奋盔甲(核心回血装)、自然之力。"
            },
            "奎桑提": {
                counteredBy: "盖伦 (真伤斩杀)、德莱厄斯 (流血真伤)、莫德凯撒 (偷属性)",
                counters: "贾克斯、艾瑞莉娅、锐雯 (操作型战士/刺客)",
                build: "核心：败魔(抗AP)、冰脉护手。\n后期：千变者贾修、日炎圣盾。"
            },
            "慎": {
                counteredBy: "莫德凯撒、德莱厄斯、格温 (不依赖普攻或推线极快)",
                counters: "贾克斯、卡蜜尔、雷克顿 (W剑阵克制普攻)",
                build: "核心：日炎圣盾(弥补清线)、巨型九头蛇。\n防装：荆棘之甲、自然之力。"
            },

            // --- 🏹 法系与长手 (AP & Ranged) ---
            "格温": {
                counteredBy: "锐雯、贾克斯、菲奥娜 (高机动性爆发战士)",
                counters: "赛恩、奥恩、蒙多 (百分比真伤天克肉坦)",
                build: "核心：峡谷制造者、纳什之牙。\n输出：灭世者之帽、星界驱驰。"
            },
            "提莫": {
                counteredBy: "艾瑞莉娅 (Q兵贴脸)、潘森 (无脑W突进)、墨菲特 (大招强开)",
                counters: "盖伦、德莱厄斯、俄洛伊 (手短笨重的重装战士)",
                build: "核心：纳什之牙、兰德里的苦楚(大面具)。\n输出：无限法球、灭世者之帽。"
            },
            "杰斯": {
                counteredBy: "艾瑞莉娅 (位移多)、墨菲特 (护甲高且能强开)、悟空",
                counters: "德莱厄斯、盖伦、瑟提 (利用双形态风筝笨重战士)",
                build: "核心：魔宗、幽梦之魂。\n输出：黑色切割者、赛瑞尔达的怨恨。"
            },
            "凯南": {
                counteredBy: "艾瑞莉娅 (突进多)、赛恩 (清线快打不动)、墨菲特 (互交大招凯南必死)",
                counters: "贾克斯、盖伦、雷克顿 (长手消耗，E技能加速拉开)",
                build: "核心：海克斯科技发电机(推推棒)、灭世者之帽。\n输出：无限法球、虚空之杖。"
            },
            "薇恩": {
                counteredBy: "提莫 (致盲)、潘森 (点控爆发)、墨菲特 (无脑强开)",
                counters: "莫德凯撒、盖伦、赛恩 (真伤天克所有笨重前排)",
                build: "核心：破败王者之刃、幻影之舞/电刃。\n输出：无尽之刃、多米尼克领主的致意。"
            },
            "弗拉基米尔": {
                counteredBy: "锐雯、艾瑞莉娅、卡蜜尔 (前期高爆发且有多段突进)",
                counters: "坦克、大部分重装战士 (无蓝条无限续航，发育无压力)",
                build: "核心：星界驱驰、灭世者之帽。\n输出：无限法球、虚空之杖。"
            },
            "阿卡丽": {

                counters: "提莫、杰斯、纳尔 (高爆发刺杀脆皮长手)",
                build: "核心：海克斯科技发电机、灭世者之帽。\n输出：无限法球、巫妖之祸。"
            }
        };

        function searchHero() {
            const input = document.getElementById('searchInput').value.trim();
            const resultDiv = document.getElementById('result');
            const noResult = document.getElementById('noResult');
            
            if (heroData[input]) {
                resultDiv.classList.remove('hidden');
                noResult.classList.add('hidden');
                document.getElementById('counteredBy').innerText = heroData[input].counteredBy;
                document.getElementById('counters').innerText = heroData[input].counters;
                document.getElementById('buildAdvice').innerText = heroData[input].build;
            } else {
                resultDiv.classList.add('hidden');
                noResult.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
